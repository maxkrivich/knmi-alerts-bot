[tools]
hadolint = "latest"
pre-commit = "latest"
python = "latest"
uv = "latest"

[env]
_.file = { path = ".env" , redact = true, required =  true}

[tasks.install]
description = "Create/update project venv from pyproject + lock"
run = "uv sync --all-groups"

[tasks.check-ty]
description = "Type check in project env"
depends = ["install"]
run = "uv run ty check"

[tasks.lint]
description = "Lint in project env"
depends = ["install"]
run = "uv run ruff check"


[tasks.format]
description = "Run formatting"
run = [
	"uv run ruff check --fix",
	"uv run ruff format",
]

[tasks.check-format]
description = "Check formatting"
run = "uv run ruff format --check"

[tasks.git-hooks]
description = "Run pre-commit hooks on all files"
run = "pre-commit run --all-files"

[tasks.up]
description = "Start services with Docker Compose"
run = "docker compose up --build"

[tasks.clean]
description = "Clean generated files"
run = [
	"if [ -d docs ]; then find docs -mindepth 1 -delete; fi",
	"find . -type d -name '__pycache__' -exec rm -r {} +",
	"find . -type d -name '*.egg-info' -exec rm -r {} +",
]
