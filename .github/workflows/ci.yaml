name: CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - uses: jdx/mise-action@v4
      with:
        install: true

    - name: Install dependencies
      run: mise setup

    - name: Run checks
      run: mise run full-ci-check
